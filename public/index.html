<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>家庭内デバイス・IoT管理画面</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main data-product-root="home-device-iot-dashboard" class="shell">
    <header class="topbar">
      <div>
        <h1>家庭内デバイス・IoT管理画面</h1>
        <p>家庭内デバイス台帳、状態、設置場所、手動点検をまとめる静的ダッシュボード</p>
      </div>
      <button id="run-review" type="button">レビュー実行</button>
    </header>
    <section class="workspace">
      <div class="panel">
        <h2>代表シナリオ</h2>
        <ul id="scenario-list"></ul>
      </div>
      <div class="panel">
        <h2>次アクション</h2>
        <p id="next-action">機器ごとの点検状態と次アクションを一覧化する</p>
        <output id="result">未実行</output>
      </div>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
